<!-- Landing page content — Oracle JET Redwood layout -->
<div class="oj-sm-padding-6x-top oj-sm-padding-4x-bottom oj-sm-padding-4x-horizontal oj-lg-padding-8x-horizontal">

  <!-- Welcome banner — Redwood typography classes -->
  <div class="oj-sm-margin-4x-bottom">
    <h1 class="oj-typography-heading-xl oj-text-primary-color oj-sm-margin-0">Welcome to Oracle Applications</h1>
    <p class="oj-typography-body-lg oj-text-secondary-color oj-sm-margin-2x-top oj-sm-margin-0-bottom">Explore your workspace below</p>
  </div>

  <!-- Quick-access card row — oj-c-card in oj-flex grid -->
  <div class="oj-flex oj-sm-flex-wrap-wrap oa-cards-row">

    <div class="oj-flex-item oj-sm-flex-initial">
      <oj-c-card class="oa-jet-card">
        <div class="oa-card-body">
          <div class="oa-card-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
          </div>
          <div class="oj-typography-heading-sm oa-card-title">Reports</div>
          <div class="oj-typography-body-sm oj-text-secondary-color oa-card-desc">View and manage your reports</div>
        </div>
      </oj-c-card>
    </div>

    <div class="oj-flex-item oj-sm-flex-initial">
      <oj-c-card class="oa-jet-card">
        <div class="oa-card-body">
          <div class="oa-card-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
          </div>
          <div class="oj-typography-heading-sm oa-card-title">Tasks</div>
          <div class="oj-typography-body-sm oj-text-secondary-color oa-card-desc">Track and manage your tasks</div>
        </div>
      </oj-c-card>
    </div>

    <div class="oj-flex-item oj-sm-flex-initial">
      <oj-c-card class="oa-jet-card">
        <div class="oa-card-body">
          <div class="oa-card-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
          </div>
          <div class="oj-typography-heading-sm oa-card-title">Settings</div>
          <div class="oj-typography-body-sm oj-text-secondary-color oa-card-desc">Configure your preferences</div>
        </div>
      </oj-c-card>
    </div>

  </div>
</div>

<!-- FAB — Rounded square, three-dot speech bubble (matches reference image) -->
<button id="oa-fab" on-click="[[$listeners.toggleChat]]" aria-label="Open Oracle Assistant">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path style="fill:white" d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    <circle style="fill:#C74634" cx="8.5" cy="11" r="1.3"/>
    <circle style="fill:#C74634" cx="12" cy="11" r="1.3"/>
    <circle style="fill:#C74634" cx="15.5" cy="11" r="1.3"/>
  </svg>
</button>

<!-- Chat window — shown when chatOpen = true -->
<oj-bind-if test="[[ $variables.chatOpen ]]">
  <div id="oa-chat-window">

    <!-- Header — plain white, matching reference image -->
    <div class="oa-header">
      <span class="oa-header-title oj-typography-subheading-md">Oracle Assistant</span>
      <div class="oa-header-actions">

        <!-- Mute toggle -->
        <button class="oa-icon-btn" on-click="[[$listeners.toggleMute]]" aria-label="Toggle mute">
          <oj-bind-if test="[[ $variables.isMuted ]]">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </oj-bind-if>
          <oj-bind-if test="[[ !$variables.isMuted ]]">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5zm7-2L9.91 9H7v6h2.91L12 17.14V7z"/>
            </svg>
          </oj-bind-if>
        </button>

        <!-- Minimize -->
        <button class="oa-icon-btn" on-click="[[$listeners.toggleChat]]" aria-label="Minimize chat">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>

      </div>
    </div>

    <!-- Messages area -->
    <div id="oa-messages-area">

      <!-- Date/time separator — "JUNE 17, 2026 AT 3:37 PM" format -->
      <div class="oa-date-sep oj-typography-body-xs">
        <oj-bind-text value="[[ $variables.chatDateLabel ]]"></oj-bind-text>
      </div>

      <!-- Message list -->
      <oj-bind-for-each data="[[ $variables.chatMessages ]]">
        <template>

          <!-- Bot bubble -->
          <oj-bind-if test="[[ $current.data.sender === 'bot' ]]">
            <div class="oa-msg-row bot">
              <div class="oa-bubble bot oj-typography-body-sm">
                <oj-bind-text value="[[ $current.data.text ]]"></oj-bind-text>
              </div>
              <span class="oa-msg-time oj-typography-body-xs oj-text-secondary-color">
                <oj-bind-text value="[[ $current.data.time ]]"></oj-bind-text>
              </span>
            </div>
          </oj-bind-if>

          <!-- User bubble -->
          <oj-bind-if test="[[ $current.data.sender === 'user' ]]">
            <div class="oa-msg-row user">
              <div class="oa-bubble user oj-typography-body-sm">
                <oj-bind-text value="[[ $current.data.text ]]"></oj-bind-text>
              </div>
              <span class="oa-msg-time oj-typography-body-xs oj-text-secondary-color">
                <oj-bind-text value="[[ $current.data.time ]]"></oj-bind-text>
              </span>
            </div>
          </oj-bind-if>

        </template>
      </oj-bind-for-each>

      <!-- Typing indicator — three bouncing dots while bot is composing a reply -->
      <oj-bind-if test="[[ $variables.isTyping ]]">
        <div class="oa-msg-row bot">
          <div class="oa-bubble bot oa-typing">
            <span class="oa-typing-dot"></span>
            <span class="oa-typing-dot"></span>
            <span class="oa-typing-dot"></span>
          </div>
        </div>
      </oj-bind-if>

    </div>

    <!-- Input bar -->
    <div class="oa-input-bar">
      <input
        id="oa-input"
        type="text"
        placeholder="Type a message..."
        autocomplete="off"
        on-keydown="[[$listeners.handleKeyDown]]"
        aria-label="Type a message"
      />
      <button class="oa-send-btn" on-click="[[$listeners.sendMessage]]" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button class="oa-mic-btn" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>

  </div>
</oj-bind-if>
