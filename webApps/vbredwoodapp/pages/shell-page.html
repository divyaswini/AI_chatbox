<div id="pageContent" class="oj-web-applayout-page">
    <div class="oj-web-applayout-content-nopad oj-web-applayout-max-width">

      <div class="oj-flex">
        <oj-sp-messages-banner data="[[ $variables.messagesBannerADP ]]" class="oj-flex-item oj-sm-12 oj-md-12"
          on-sp-close="[[$listeners.messagesBannerSpClose]]"
          ></oj-sp-messages-banner>
      </div>

      <oj-sp-messages-toast primary-text="[[ $variables.messageToast ]]" id="messageToast"></oj-sp-messages-toast>

      <div class="oj-flex">
        <!-- Renders flow content -->
        <oj-vb-content id="vbRouterContent" class="oj-flex-item" config="[[vbRouterFlow]]">

        </oj-vb-content>

      </div>
    </div>
  </div>

<!-- ═══════════════════════════════════════════════════
     ORACLE ASSISTANT CHAT WIDGET
     Lives in shell-page so position:fixed works correctly
════════════════════════════════════════════════════ -->
<style>
  /* ── FAB ─────────────────────────────────── */
  #oa-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #C74634;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(199,70,52,0.5);
    z-index: 9999;
    transition: transform 0.15s, box-shadow 0.15s;
    outline: none;
    padding: 0;
  }
  #oa-fab:hover  { transform: scale(1.1);  box-shadow: 0 6px 24px rgba(199,70,52,0.6); }
  #oa-fab:active { transform: scale(0.95); }
  #oa-fab svg { width: 26px; height: 26px; fill: white; display: block; }

  /* ── Chat window ─────────────────────────── */
  #oa-chat-window {
    position: fixed;
    bottom: 90px;
    right: 16px;
    width: 318px;
    height: 470px;
    background: #f5f5f5;
    border-radius: 14px;
    box-shadow: 0 12px 44px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    z-index: 9998;
    overflow: hidden;
    font-family: "Oracle Sans", "Helvetica Neue", Arial, sans-serif;
    animation: oaSlideIn 0.22s cubic-bezier(0.34,1.25,0.64,1);
  }
  @keyframes oaSlideIn {
    from { opacity: 0; transform: translateY(28px) scale(0.93); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Header ──────────────────────────────── */
  .oa-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 14px 12px;
    background: #fff;
    border-bottom: 1px solid #e6e6e6;
    flex-shrink: 0;
  }
  .oa-header-title { font-size: 14.5px; font-weight: 600; color: #1c1c1c; }
  .oa-header-actions { display: flex; gap: 2px; align-items: center; }
  .oa-icon-btn {
    background: none; border: none; cursor: pointer;
    padding: 5px; color: #6b6b6b; border-radius: 6px;
    line-height: 0; outline: none;
  }
  .oa-icon-btn:hover { background: #f0f0f0; color: #1c1c1c; }
  .oa-icon-btn svg { width: 18px; height: 18px; display: block; }

  /* ── Messages ────────────────────────────── */
  #oa-messages-area {
    flex: 1; overflow-y: auto;
    padding: 12px 14px 8px;
    display: flex; flex-direction: column;
    background: #f5f5f5;
  }
  #oa-messages-area::-webkit-scrollbar { width: 4px; }
  #oa-messages-area::-webkit-scrollbar-thumb { background: #c8c8c8; border-radius: 2px; }

  .oa-date-sep {
    text-align: center; font-size: 11px; color: #999;
    letter-spacing: 0.5px; font-weight: 500; margin: 0 0 12px;
  }
  .oa-msg-row { display: flex; flex-direction: column; margin-bottom: 10px; }
  .oa-msg-row.bot  { align-items: flex-start; }
  .oa-msg-row.user { align-items: flex-end; }

  .oa-bubble { font-size: 13.5px; line-height: 1.52; word-wrap: break-word; max-width: 87%; }
  .oa-bubble.bot {
    background: #fff; border: 1px solid #e5e5e5;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-radius: 12px 12px 12px 3px;
    padding: 10px 13px; color: #1c1c1c;
  }
  .oa-bubble.user {
    background: #e2e2e2;
    border-radius: 16px 16px 3px 16px;
    padding: 7px 14px; color: #1c1c1c; font-size: 13px;
  }
  .oa-msg-time { font-size: 11px; color: #aaa; margin-top: 4px; padding: 0 3px; }

  /* ── Input bar ───────────────────────────── */
  .oa-input-bar {
    display: flex; align-items: center;
    padding: 9px 10px 9px 12px;
    background: #fff; border-top: 1px solid #e6e6e6;
    gap: 6px; flex-shrink: 0;
  }
  #oa-input {
    flex: 1; min-width: 0;
    border: 1px solid #e0e0e0; border-radius: 22px;
    padding: 8px 14px; font-size: 13px; outline: none;
    background: #f7f7f7; color: #1c1c1c; font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  #oa-input:focus { border-color: #C74634; background: #fff; box-shadow: 0 0 0 2px rgba(199,70,52,0.12); }
  #oa-input::placeholder { color: #b2b2b2; }

  .oa-send-btn, .oa-mic-btn {
    background: none; border: none; cursor: pointer;
    padding: 6px; color: #9a9a9a; border-radius: 50%;
    line-height: 0; flex-shrink: 0; outline: none;
    transition: color 0.12s, background 0.12s;
  }
  .oa-send-btn:hover { color: #C74634; background: rgba(199,70,52,0.08); }
  .oa-mic-btn:hover  { color: #555; background: #f0f0f0; }
  .oa-send-btn svg, .oa-mic-btn svg { width: 20px; height: 20px; display: block; }
</style>

<!-- FAB button -->
<button id="oa-fab" on-click="[[$listeners.toggleChat]]" aria-label="Open Oracle Assistant">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
  </svg>
</button>

<!-- Chat window (shown only when chatOpen = true) -->
<oj-bind-if test="[[ $variables.chatOpen ]]">
  <div id="oa-chat-window">

    <!-- Header -->
    <div class="oa-header">
      <span class="oa-header-title">Oracle Assistant</span>
      <div class="oa-header-actions">

        <!-- Mute button -->
        <button class="oa-icon-btn" on-click="[[$listeners.toggleMute]]" aria-label="Toggle mute">
          <oj-bind-if test="[[ $variables.isMuted ]]">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </oj-bind-if>
          <oj-bind-if test="[[ !$variables.isMuted ]]">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5zm7-2L9.91 9H7v6h2.91L12 17.14V7z"/>
            </svg>
          </oj-bind-if>
        </button>

        <!-- Minimize button -->
        <button class="oa-icon-btn" on-click="[[$listeners.toggleChat]]" aria-label="Minimize">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>

      </div>
    </div>

    <!-- Messages area -->
    <div id="oa-messages-area">
      <div class="oa-date-sep">
        <oj-bind-text value="[[ $variables.chatDateLabel ]]"></oj-bind-text>
      </div>

      <oj-bind-for-each data="[[ $variables.chatMessages ]]">
        <template>
          <!-- Bot bubble -->
          <oj-bind-if test="[[ $current.data.sender === 'bot' ]]">
            <div class="oa-msg-row bot">
              <div class="oa-bubble bot">
                <oj-bind-text value="[[ $current.data.text ]]"></oj-bind-text>
              </div>
              <span class="oa-msg-time">
                <oj-bind-text value="[[ $current.data.time ]]"></oj-bind-text>
              </span>
            </div>
          </oj-bind-if>
          <!-- User bubble -->
          <oj-bind-if test="[[ $current.data.sender === 'user' ]]">
            <div class="oa-msg-row user">
              <div class="oa-bubble user">
                <oj-bind-text value="[[ $current.data.text ]]"></oj-bind-text>
              </div>
              <span class="oa-msg-time">
                <oj-bind-text value="[[ $current.data.time ]]"></oj-bind-text>
              </span>
            </div>
          </oj-bind-if>
        </template>
      </oj-bind-for-each>
    </div>

    <!-- Input bar -->
    <div class="oa-input-bar">
      <input
        id="oa-input"
        type="text"
        placeholder="Type a message"
        autocomplete="off"
        on-keydown="[[$listeners.handleKeyDown]]"
        aria-label="Type a message"
      />
      <button class="oa-send-btn" on-click="[[$listeners.sendMessage]]" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button class="oa-mic-btn" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>

  </div>
</oj-bind-if>
